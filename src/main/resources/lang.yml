prefix: "&a[AttributeBinder]&r "

error-no-permission: "{prefix} &c你没有权限执行此指令。"
error-player-not-found: "{prefix} &c玩家 {player} 不在线。"
error-no-online-players: "{prefix} &c当前没有在线玩家。"

command-main-usage: "{prefix} &e用法: /attributebinder <give|replace|remove|list|reload|flush|help>"
command-give-usage: "{prefix} &e用法: /attributebinder give <玩家> <属性> <数值> [KeyID]/[--k:<KeyID>] [--mem:<true|false>] [--exp:<ticks>] [--md:(replace|give)] [--mx:<上限值>]"
command-remove-usage: "{prefix} &e用法: /attributebinder remove <玩家|*> <属性ID|all|key> [KeyID]"
command-remove-key-success: "{prefix} &e已删除玩家 {player} 的 Key {key} 下所有属性"
command-list-usage: "{prefix} &e用法: /attributebinder list <玩家> [all|keys <属性>|keyattrs <KeyID>|inspect <属性>|source <属性> <来源>|stats <属性>]"
command-replace-usage: "{prefix} &e用法: /attributebinder replace <玩家> <属性> <数值> [KeyID]/[--k:<KeyID>] [--mem:<true|false>] [--exp:<ticks>] [--md:(replace|give)]"

command-reload-success: "{prefix} &a插件配置与语言文件已重载！"
command-flush-success: "{prefix} &a已强制写入数据库并清理缓存。"

command-give-invalid-number: "{prefix} &c数值格式非法，请输入有效数字"
command-give-success: "{prefix} &a已为 &b{player} &a的 &d{key} &a设置 &e{attribute} = {value} &7[内存:{memoryOnly}, 过期ticks:{expireTicks}]"

command-remove-success: "{prefix} &a已移除 &b{player} &a的 &d{key} &e{attribute} 属性"
command-remove-all-success: "{prefix} &a已移除 &b{player} &a的所有属性加成"
command-remove-all-players-success: "{prefix} &a已为 {count} 位在线玩家移除 &d{key} &e{attribute} 属性"

command-list-header: "{prefix} &e{player} 当前属性加成："
command-list-item: "&6- {attribute}：{value}"
command-list-empty: "{prefix} &c{player} 当前无任何属性加成"
command-list-key-header: "&d{key}:"

command-replace-success: "{prefix} &a已将 &b{player} &a的 &d{key} &e{attribute} 设置为 {value} &7[内存:{memoryOnly}, 过期ticks:{expireTicks}]"
command-no-change: "{prefix} &e属性未改变，无需操作"

# 弃用提示已移除（保留键以避免空指针），不再输出任何内容
command-deprecated-expire-arg: ""

# 占位符格式化配置
# 空列表显示
placeholder-list-empty: "&7无属性加成"

# AttributeBinder属性列表格式
placeholder-list-key-header: "\n&d【{key}】\n"
placeholder-list-item: "  &6{attribute}: &e{value}\n"
placeholder-list-separator: "\n"

# 所有属性列表格式
placeholder-list-ab-header: "&a=== AttributeBinder属性 ===\n"
placeholder-list-other-header: "&b=== 其他来源属性 ===\n"
placeholder-list-other-item: "  &6{attribute}: &e{value} &7(总计: {total})\n"

# 指定key属性格式
placeholder-key-empty: "&7Key '{key}' 下无属性"
placeholder-key-item: "  &6{attribute}: &e{value}\n"

# 详细检查占位符格式
placeholder-inspect-header: "&a=== {stat} 属性详细信息 ===\n&f总值: &e{total}\n&f修饰符列表:\n"
placeholder-inspect-item: "  &6{key}: &e{value} &7[{type}] &8({source}) &9{slot}\n"
placeholder-inspect-empty: "&7该属性无任何修饰符\n"
placeholder-inspect-error: "&c检查属性时发生错误: {error}"

# 按来源过滤占位符格式
placeholder-source-header: "&a=== {stat} 属性 - {source} 来源 ===\n"
placeholder-source-item: "  &6{key}: &e{value} &7[{type}]\n"
placeholder-source-empty: "&7该来源下无修饰符\n"
placeholder-source-invalid: "&c无效的修饰符来源: {source}"
placeholder-source-error: "&c按来源过滤时发生错误: {error}"

# 统计信息占位符格式
placeholder-stats-template: "&a=== {stat} 属性统计 ===\n&f总值: &e{total}\n&f修饰符数量: &e{count}\n&f固定值总计: &e{flat_total}\n&f相对值总计: &e{relative_total}\n&f乘法值总计: &e{multiplicative_total}\n\n&f来源分布:\n{source_breakdown}\n&f类型分布:\n{type_breakdown}"
placeholder-stats-source-item: "  &6{source}: &e{count}个\n"
placeholder-stats-type-item: "  &6{type}: &e{count}个\n"
placeholder-stats-error: "&c获取统计信息时发生错误: {error}"

# 命令错误消息
