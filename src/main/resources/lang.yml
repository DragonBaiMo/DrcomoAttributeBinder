command-list-keyattrs-usage: "&c用法: /attributebinder list <玩家> keyattrs <KeyID>"
command-list-inspect-usage: "&c用法: /attributebinder list <玩家> inspect <属性>"
command-list-source-usage: "&c用法: /attributebinder list <玩家> source <属性> <来源>"
command-list-stats-usage: "&c用法: /attributebinder list <玩家> stats <属性>"
