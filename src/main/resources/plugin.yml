name: AttributeBinder
version: '1.0'
main: com.baimo.attributeBinder.AttributeBinder
api-version: '1.20'
depend: [PlaceholderAPI, MythicLib, MMOItems]
commands:
  attributebinder:
    description: 属性加成管理
    usage: /attributebinder <give|replace|remove|list|reload|flush>
    aliases: [abb, attributeBinder]
permissions:
  attributebinder.*:
    description: 所有 AttributeBinder 权限
    children:
      attributebinder.admin: true
      attributebinder.give: true
      attributebinder.remove: true
      attributebinder.list: true
      attributebinder.replace: true
  attributebinder.admin:
    description: 重载与写库权限
    default: op
  attributebinder.give:
    description: 使用 /ab give
    default: op
  attributebinder.remove:
    description: 使用 /ab remove
    default: op
  attributebinder.list:
    description: 使用 /ab list
    default: true
  attributebinder.replace:
    description: 使用 /ab replace
    default: op
